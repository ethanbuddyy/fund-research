name: CI

# 把本地护栏焊成 push/PR 的强制门：mypy 守 TypedDict 契约（防"改 key 漂移"），
# pytest 守主链路与不变量。任一红则合并被挡。
on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          # pandas 3.0 要求 Python ≥ 3.11；同时覆盖最低版本与当前主力版本。
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.lock

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          # 运行依赖使用 lock；开发工具显式安装，避免依赖系统环境偶然携带。
          pip install -r requirements.lock
          pip install mypy==2.1.0 pytest==9.0.2

      - name: Type check (mypy 契约护栏)
        run: mypy src/

      - name: Run tests
        run: pytest
